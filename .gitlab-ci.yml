# GitLab CI/CD：在 main 打上 vX.Y.Z 版本 tag 時，同時觸發兩件事——
#   1. deploy：於 host daemon 本地 build 新 image 並重啟容器（重新部署）。
#   2. mirror：把儲存庫（main + 該 tag）鏡像推送到 GitHub。
# 兩者互不相依、並行（皆 needs: []）。
#
# ── 流程 ───────────────────────────────────────────────────────────
#   feature 分支 → 開 Merge Request → 合併進 main（此時不觸發任何管線）
#   → 於 main 打上 vX.Y.Z 版本 tag → 本管線於該 tag 觸發
#   → deploy 重新部署服務、mirror 鏡像推送到 GitHub。
#
# ── 認證來源 ───────────────────────────────────────────────────────
#   GITHUB_SSH_KEY  由 GitLab Runner 注入（config.toml 的 environment 或掛載）。
#                   其值可為 SSH 私鑰的「檔案路徑」或「私鑰內容」，本管線兩者皆支援。
#                   對應公鑰需加到 GitHub repo → Settings → Deploy keys，並勾選
#                   Allow write access。
#
# ── 注意 ───────────────────────────────────────────────────────────
#   GIT_DEPTH: 0 取得完整歷史，避免 shallow clone 導致 GitHub 推送被拒。
#   deploy job 仰賴 GitLab Runner 為 docker executor 且掛載 /var/run/docker.sock，
#   故 job 內的 docker 指令直接作用在 host daemon（與 run.sh / build.sh 等價）。

stages:
  - deploy
  - mirror

workflow:
  rules:
    # 僅在 main 打上 vX.Y.Z 版本 tag 時建立管線（合併進 main 本身不觸發）
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

# ── deploy：tag 觸發，host 本地 build 新 image 並重啟容器 ──────────────
deploy:
  stage: deploy
  image: docker:27
  needs: []                       # 與 mirror 互不相依、並行
  resource_group: deploy          # 同 repo 不並發部署
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  variables:
    IMAGE: "nk7260ynpa/tw_stock_specialinfo"
    CONTAINER: "tw-stock-specialinfo"
    LOGS_VOLUME: "tw-stock-specialinfo_logs"
    LOGS_PATH: "/app/logs"
  before_script:
    - export VERSION="${CI_COMMIT_TAG#v}"
  script:
    # 嚴格 build → rm -f → run：build 失敗即中止、舊容器不動、服務不中斷
    - docker build -f docker/Dockerfile -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
    - docker rm -f "$CONTAINER" || true
    - docker run -d
        --name "$CONTAINER"
        --restart=always
        --network db_network
        --volume "$LOGS_VOLUME:$LOGS_PATH"
        "$IMAGE:latest"
    - docker image prune -f || true

# ── mirror：tag 觸發，將 main 與該 tag 鏡像推送到 GitHub ───────────────
mirror-to-github:
  stage: mirror
  image: alpine:3.20
  needs: []                       # 與 deploy 互不相依、並行
  variables:
    GIT_DEPTH: 0                                       # 完整歷史，確保可 fast-forward 推送
    GITHUB_REPO: "git@github.com:nk7260ynpa/SpecialInfo.git"
    SSH_KEY_PATH: "/tmp/github_deploy_key"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  before_script:
    - apk add --no-cache git openssh-client
    - |
      if [ -z "$GITHUB_SSH_KEY" ]; then
        echo "ERROR: GITHUB_SSH_KEY 未設定（應由 GitLab Runner 注入）" >&2
        exit 1
      fi
      # GITHUB_SSH_KEY 可能是金鑰檔路徑，或直接是金鑰內容，兩者皆處理
      if [ -f "$GITHUB_SSH_KEY" ]; then
        install -m 600 "$GITHUB_SSH_KEY" "$SSH_KEY_PATH"
      else
        printf '%s\n' "$GITHUB_SSH_KEY" > "$SSH_KEY_PATH"
        chmod 600 "$SSH_KEY_PATH"
      fi
  script:
    - export GIT_SSH_COMMAND="ssh -i $SSH_KEY_PATH -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes"
    - git remote remove github 2>/dev/null || true
    - git remote add github "$GITHUB_REPO"
    - git push github "HEAD:refs/heads/main"
    - git push github "refs/tags/$CI_COMMIT_TAG"
